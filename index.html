<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشار المصاريف الذكي</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        /* لوحة التقارير السريعة */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-background);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #64748b;
            font-size: 1.1rem;
        }

        .card .amount {
            font-size: 1.8rem;
            font-weight: bold;
        }

        #total-amount {
            color: var(--success-color);
        }

        #highest-expense {
            color: var(--danger-color);
            font-size: 1.4rem;
        }

        /* نموذج إدخال البيانات */
        .form-section {
            background-color: var(--card-background);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        @media (max-width: 600px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        /* جدول وعرض المصاريف */
        .list-section {
            background-color: var(--card-background);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .delete-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 5px;
        }

        .delete-btn:hover {
            text-decoration: underline;
        }

        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>مُتابع المصاريف الذكي</h1>
        <p>نظّم ميزانيتك واعرف أين تذهب أموالك</p>
    </header>

    <!-- لوحة البيانات السريعة -->
    <div class="dashboard">
        <div class="card">
            <h3>إجمالي ما تم صرفه</h3>
            <div class="amount" id="total-amount">0 ر.س</div>
        </div>
        <div class="card">
            <h3>أعلى مصروف</h3>
            <div class="amount" id="highest-expense">لا يوجد حالياً</div>
        </div>
    </div>

    <!-- قسم إضافة مصروف جديد -->
    <div class="form-section">
        <form id="expense-form" onsubmit="addExpense(event)">
            <div class="form-group">
                <div>
                    <label for="expense-name">بيان المصروف (ماذا اشتريت؟)</label>
                    <input type="text" id="expense-name" placeholder="مثلاً: مقاضي البيت، بنزين..." required>
                </div>
                <div>
                    <label for="expense-amount">المبلغ (ر.س)</label>
                    <input type="number" id="expense-amount" min="0.1" step="any" placeholder="0.00" required>
                </div>
                <div>
                    <label for="expense-category">الفئة</label>
                    <select id="expense-category">
                        <option value="طعام ومطاعم">طعام ومطاعم</option>
                        <option value="فواتير والتزامات">فواتير والتزامات</option>
                        <option value="سيارة ونقل">سيارة ونقل</option>
                        <option value="ترفيه وتسوق">ترفيه وتسوق</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>
                <div>
                    <button type="submit">إضافة</button>
                </div>
            </div>
        </form>
    </div>

    <!-- جدول عرض المصاريف السابقة -->
    <div class="list-section">
        <h3 style="margin-top: 0;">سجل المصاريف</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>المصروف</th>
                        <th>الفئة</th>
                        <th>المبلغ</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="expense-list">
                    <!-- سيتم إضافة العناصر هنا عبر الجافاسكريبت -->
                </tbody>
            </table>
            <div id="no-expenses" class="empty-message">لم تقم بإضافة أي مصاريف بعد.</div>
        </div>
    </div>
</div>

<script>
    // مصفوفة لتخزين المصاريف محلياً
    let expenses = JSON.parse(localStorage.getItem('myExpenses')) || [];

    // دالة لتحديث واجهة المستخدم والحسابات
    function updateUI() {
        const listContainer = document.getElementById('expense-list');
        const emptyMessage = document.getElementById('no-expenses');
        const totalAmountEl = document.getElementById('total-amount');
        const highestExpenseEl = document.getElementById('highest-expense');

        // مسح الجدول القديم
        listContainer.innerHTML = '';

        if (expenses.length === 0) {
            emptyMessage.style.display = 'block';
            totalAmountEl.innerText = '0 ر.س';
            highestExpenseEl.innerText = 'لا يوجد حالياً';
            return;
        }

        emptyMessage.style.display = 'none';

        let total = 0;
        let highest = expenses[0];

        // بناء الجدول وحساب الإجماليات
        expenses.forEach((expense, index) => {
            total += parseFloat(expense.amount);

            // تحديد المصروف الأعلى
            if (parseFloat(expense.amount) > parseFloat(highest.amount)) {
                highest = expense;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${expense.name}</td>
                <td><span style="color: #64748b; font-size: 0.9rem;">${expense.category}</span></td>
                <td style="font-weight: 600;">${parseFloat(expense.amount).toFixed(2)} ر.س</td>
                <td><button class="delete-btn" onclick="deleteExpense(${index})">حذف</button></td>
            `;
            listContainer.appendChild(tr);
        });

        // تحديث المربعات العلوية
        totalAmountEl.innerText = `${total.toFixed(2)} ر.س`;
        highestExpenseEl.innerText = `${highest.name} (${parseFloat(highest.amount).toFixed(2)} ر.س)`;
    }

    // دالة لإضافة مصروف جديد
    function addExpense(event) {
        event.preventDefault();

        const nameInput = document.getElementById('expense-name');
        const amountInput = document.getElementById('expense-amount');
        const categoryInput = document.getElementById('expense-category');

        const newExpense = {
            name: nameInput.value.trim(),
            amount: parseFloat(amountInput.value),
            category: categoryInput.value
        };

        expenses.push(newExpense);
        
        // حفظ في الذاكرة المحلية
        localStorage.setItem('myExpenses', JSON.stringify(expenses));

        // إعادة ضبط الحقول وتحديث الشاشة
        nameInput.value = '';
        amountInput.value = '';
        updateUI();
    }

    // دالة لحذف مصروف
    function deleteExpense(index) {
        expenses.splice(index, 1);
        localStorage.setItem('myExpenses', JSON.stringify(expenses));
        updateUI();
    }

    // تشغيل التحديث فور فتح الصفحة لاسترجاع البيانات المخزنة
    updateUI();
</script>

</body>
</html>
